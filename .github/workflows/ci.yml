name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent-service:
    name: Agent service (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent_service
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Install deps
        run: uv pip install --system -e ".[dev]"
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Tests (LLM calls mocked)
        env:
          GEMINI_API_KEY: test-key
          LLM_PROVIDER: gemini
        run: uv run pytest -v

  client:
    name: Client (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
